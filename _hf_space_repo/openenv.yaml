spec_version: 1
name: data-quality-triage-assistant
version: 0.1.0
description: >-
  A real-world data analysis OpenEnv where agents perform data quality triage
  through cleaning, validation, and submission workflows. Made by #TEAM
  Hack-with-Pals.
type: space
runtime: fastapi
app: app:app
port: 7860
entrypoint: env.environment:DataQualityTriageEnv
author: "#TEAM Hack-with-Pals"
license: mit
tags:
  - openenv
  - data-analysis
  - data-cleaning
observation_model: env.models:Observation
action_model: env.models:Action
reward_model: env.models:Reward
default_task: easy_missing_and_dupes
tasks:
  - task_id: easy_missing_and_dupes
    id: easy_missing_and_dupes
    name: easy_missing_and_dupes
    task: easy_missing_and_dupes
    grader: env.graders:grade_easy_missing_and_dupes
    difficulty: easy
    step_budget: 8
  - task_id: medium_type_and_category
    id: medium_type_and_category
    name: medium_type_and_category
    task: medium_type_and_category
    grader: env.graders:grade_medium_type_and_category
    difficulty: medium
    step_budget: 10
  - task_id: hard_conflicts_and_budget
    id: hard_conflicts_and_budget
    name: hard_conflicts_and_budget
    task: hard_conflicts_and_budget
    grader: env.graders:grade_hard_conflicts_and_budget
    difficulty: hard
    step_budget: 12
task_graders:
  easy_missing_and_dupes: env.graders:grade_easy_missing_and_dupes
  medium_type_and_category: env.graders:grade_medium_type_and_category
  hard_conflicts_and_budget: env.graders:grade_hard_conflicts_and_budget
graders:
  easy_missing_and_dupes: env.graders:grade_easy_missing_and_dupes
  medium_type_and_category: env.graders:grade_medium_type_and_category
  hard_conflicts_and_budget: env.graders:grade_hard_conflicts_and_budget
task_definitions:
  - task_id: easy_missing_and_dupes
    id: easy_missing_and_dupes
    name: easy_missing_and_dupes
    grader: env.graders:grade_easy_missing_and_dupes
  - task_id: medium_type_and_category
    id: medium_type_and_category
    name: medium_type_and_category
    grader: env.graders:grade_medium_type_and_category
  - task_id: hard_conflicts_and_budget
    id: hard_conflicts_and_budget
    name: hard_conflicts_and_budget
    grader: env.graders:grade_hard_conflicts_and_budget
tasks_with_graders:
  - task_id: easy_missing_and_dupes
    grader: env.graders:grade_easy_missing_and_dupes
  - task_id: medium_type_and_category
    grader: env.graders:grade_medium_type_and_category
  - task_id: hard_conflicts_and_budget
    grader: env.graders:grade_hard_conflicts_and_budget
tasks_count: 3
graders_count: 3
